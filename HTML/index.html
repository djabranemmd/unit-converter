<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Liquid Unit Converter</title>

        <link rel="stylesheet" href="../css/style.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
            rel="stylesheet">
    </head>

    <body>

        <div class="bg"></div>

        <div class="app">

            <header>
                <h1>Unit Converter</h1>
                <p>Liquid Glass Experience</p>
            </header>

            <div class="glass">

                <!-- categories -->
                <div class="categories">
                    <button class="cat active" data-cat="length">Length</button>
                    <button class="cat" data-cat="weight">Weight</button>
                    <button class="cat" data-cat="temp">Temp</button>
                    <button class="cat" data-cat="currency">Currency</button>
                </div>

                <!-- input -->
                <div class="field">
                    <input type="number" id="valueInput"
                        placeholder="Enter value..." />
                </div>

                <!-- swap -->
                <div class="swap">
                    <button id="swapBtn">⇄ Swap</button>
                </div>

                <!-- options -->
                <div class="options" id="options"></div>

                <!-- result -->
                <div class="result">
                    <span>Result</span>
                    <h2 id="result">0</h2>
                </div>

            </div>

        </div>

        <script src="../js/script.js"></script>
    </body>
</html>
