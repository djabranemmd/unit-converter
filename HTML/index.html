<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Unit Converter</title>

        <link rel="stylesheet" href="../css/style.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
            rel="stylesheet">
    </head>

    <body>

        <div class="container">

            <h1>🌍 Unit Converter</h1>
            <p class="subtitle">Fast & Modern Conversion Tool</p>

            <div class="converter-card">

                <!-- CATEGORY BUTTONS -->
                <div class="category-tabs">

                    <button class="tab active" data-category="length">📏
                        Length</button>
                    <button class="tab" data-category="weight">⚖️
                        Weight</button>
                    <button class="tab" data-category="temp">🌡️ Temp</button>
                    <button class="tab" data-category="currency">💱
                        Money</button>

                </div>

                <!-- INPUT -->
                <div class="input-group">
                    <label>Value</label>
                    <input type="number" id="inputValue"
                        placeholder="Enter value..." />
                </div>

                <!-- CONVERSION OPTIONS (dynamic) -->
                <div class="options" id="optionsBox"></div>

                <!-- RESULT -->
                <div class="result-box">
                    <h2>Result</h2>
                    <div id="result">0</div>
                </div>

            </div>

        </div>

        <script src="../js/script.js"></script>
    </body>
</html>
